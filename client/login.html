<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Group Tracker</title>
    <link rel="stylesheet" href="assets/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Please enter your details</p>

        <!-- Clerk Sign-In Button Container -->
        <div id="clerk-signin" style="margin-bottom: 2rem;"></div>

        <div
            style="display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; color: var(--text-muted); font-size: 0.75rem;">
            <div style="flex: 1; height: 1px; background: var(--border);"></div>
            OR
            <div style="flex: 1; height: 1px; background: var(--border);"></div>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="name@company.com">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit">Sign In</button>
        </form>
        <p class="footer-text">Don't have an account? <a href="register.html">Sign up</a></p>
    </div>

    <!-- Clerk SDK -->
    <script async crossorigin="anonymous"
        data-clerk-publishable-key="pk_test_aGVscGluZy1vc3ByZXktNDAuY2xlcmsuYWNjb3VudHMuZGV2JA"
        src="https://helping-osprey-40.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
        type="text/javascript"></script>

    <script>
        window.addEventListener('load', async function () {
            await Clerk.load();

            if (Clerk.user) {
                // Already signed in with Clerk, sync and redirect
                const token = await Clerk.session.getToken();
                localStorage.setItem('token', token);
                localStorage.setItem('user', JSON.stringify({
                    id: 'clerk', // Middleware will handle the real mapping
                    username: Clerk.user.username || Clerk.user.firstName,
                    email: Clerk.user.emailAddresses[0].emailAddress,
                    role: 'user'
                }));
                window.location.href = 'index.html';
                return;
            }

            Clerk.mountSignIn(document.getElementById('clerk-signin'), {
                appearance: {
                    variables: {
                        colorPrimary: '#6366f1',
                        colorBackground: 'transparent',
                        colorText: '#f8fafc',
                    }
                }
            });
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = 'index.html';
            } else {
                alert(data.message);
            }
        });
    </script>
</body>

</html>
