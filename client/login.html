<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Group Tracker</title>
    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding-top: 0 !important;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
        }
    </style>
</head>

<body>
    <div class="glass-card login-card shadow-lg">
        <div class="text-center mb-4">
            <h2 class="fw-bold mb-1">Locator Sign In</h2>
            <p class="text-muted small">Access your shared tracking groups</p>
        </div>

        <!-- Clerk Sign-In -->
        <div id="clerk-signin" class="mb-4"></div>

        <div class="d-flex align-items-center gap-3 mb-4">
            <hr class="flex-grow-1 opacity-25">
            <span class="small fw-bold text-muted">SECURE PORTAL</span>
            <hr class="flex-grow-1 opacity-25">
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label small fw-bold text-muted">Email Address</label>
                <input type="email" id="email" class="form-control" required placeholder="name@email.com">
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-muted">Password</label>
                <input type="password" id="password" class="form-control" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">
                Continue to Dashboard
            </button>
        </form>

        <p class="text-center mt-4 mb-0 small text-muted">
            New here? <a href="register.html" class="text-primary text-decoration-none fw-bold">Create Account</a>
        </p>
    </div>

    <!-- Clerk SDK -->
    <script async crossorigin="anonymous"
        data-clerk-publishable-key="pk_test_aGVscGluZy1vc3ByZXktNDAuY2xlcmsuYWNjb3VudHMuZGV2JA"
        src="https://helping-osprey-40.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
        type="text/javascript"></script>

    <script>
        window.addEventListener('load', async function () {
            await Clerk.load();

            if (Clerk.user) {
                const token = await Clerk.session.getToken();
                localStorage.setItem('token', token);
                localStorage.setItem('user', JSON.stringify({
                    id: 'clerk',
                    username: Clerk.user.username || Clerk.user.firstName,
                    email: Clerk.user.emailAddresses[0].emailAddress,
                    role: 'user'
                }));
                window.location.href = 'index.html';
                return;
            }

            Clerk.mountSignIn(document.getElementById('clerk-signin'), {
                appearance: {
                    variables: {
                        colorPrimary: '#4f46e5',
                        colorBackground: '#ffffff',
                        colorText: '#0f172a',
                        colorTextSecondary: '#64748b'
                    }
                }
            });
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();
            if (res.ok) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = 'index.html';
            } else {
                alert(data.message);
            }
        });
    </script>
</body>

</html>
