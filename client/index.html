<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Group Tracker</title>
    <!-- Bootstrap 5.3 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg fixed-top shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fs-4" href="#">LOCATOR</a>
            <div class="ms-auto d-flex align-items-center">
                <span id="usernameDisplay" class="text-dark me-3 fw-medium"></span>
                <button id="logoutBtn" class="btn btn-outline-dark btn-sm rounded-pill px-3">
                    <i class="bi bi-box-arrow-right me-1"></i> Logout
                </button>
            </div>
        </div>
    </nav>

    <main class="container py-5 mt-5">
        <div class="row g-4">
            <!-- Sidebar / Control Panel -->
            <div class="col-lg-4">
                <div class="glass-card h-100 border-0 shadow-sm">
                    <h5 class="mb-4 fw-bold">Manage Groups</h5>

                    <div class="mb-5">
                        <label class="form-label small text-muted text-uppercase fw-bold">Create New Group</label>
                        <div class="input-group mb-2">
                            <input type="text" id="groupName" class="form-control" placeholder="Group Name">
                            <button id="createGroupBtn" class="btn btn-primary">Create</button>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label small text-muted text-uppercase fw-bold">Join Existing</label>
                        <div class="input-group">
                            <input type="text" id="groupCode" class="form-control" placeholder="Enter Invite Code">
                            <button id="joinGroupBtn" class="btn btn-outline-indigo">Join</button>
                        </div>
                    </div>

                    <hr class="my-4">

                    <h6 class="mb-3 fw-bold">Recent Alerts</h6>
                    <div id="notificationList" class="small overflow-auto" style="max-height: 250px;">
                        <!-- Notifications here -->
                    </div>
                </div>
            </div>

            <!-- Main Content Area -->
            <div class="col-lg-8">
                <div class="glass-card mb-4 border-0 shadow-sm">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="mb-0 fw-bold text-indigo">Active Group Sessions</h5>
                        <span class="badge badge-indigo rounded-pill px-3" id="groupCount">0 Items</span>
                    </div>
                    <div id="groupsList" class="row g-3">
                        <!-- Groups here -->
                    </div>
                </div>

                <!-- Admin Section (Only visible to admin) -->
                <div id="adminPanel" class="glass-card" style="display: none; border: 1px solid #fee2e2;">
                    <div class="d-flex align-items-center mb-3">
                        <i class="bi bi-shield-lock text-danger me-2 fs-5"></i>
                        <h5 class="mb-0 fw-bold text-danger">Moderator Console</h5>
                    </div>
                    <div class="d-flex gap-2 mb-4">
                        <button onclick="fetchAdminUsers()" class="btn btn-outline-dark btn-sm rounded-pill px-4">User
                            Master</button>
                        <button onclick="fetchAdminGroups()" class="btn btn-outline-dark btn-sm rounded-pill px-4">Group
                            Master</button>
                    </div>
                    <div id="adminData" class="table-responsive"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Clerk SDK -->
    <script async crossorigin="anonymous"
        data-clerk-publishable-key="pk_test_aGVscGluZy1vc3ByZXktNDAuY2xlcmsuYWNjb3VudHMuZGV2JA"
        src="https://helping-osprey-40.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
        type="text/javascript"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let token = localStorage.getItem('token');
        let user = JSON.parse(localStorage.getItem('user'));

        window.addEventListener('load', async function () {
            await Clerk.load();

            if (Clerk.user) {
                token = await Clerk.session.getToken();
                localStorage.setItem('token', token);

                const profileRes = await fetch('/api/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (profileRes.ok) {
                    user = await profileRes.json();
                } else {
                    user = {
                        id: 'clerk',
                        username: Clerk.user.username || Clerk.user.firstName,
                        email: Clerk.user.emailAddresses[0].emailAddress,
                        role: 'user'
                    };
                }
                localStorage.setItem('user', JSON.stringify(user));
                updateUI();
                initApp();
            } else if (!token) {
                window.location.href = 'login.html';
            } else {
                updateUI();
                initApp();
            }
        });

        function updateUI() {
            document.getElementById('usernameDisplay').innerText = `Howdy, ${user.username}`;
            if (user.role === 'admin') document.getElementById('adminPanel').style.display = 'block';
        }

        function initApp() {
            fetchGroups();
            fetchNotifications();
            setInterval(fetchNotifications, 10000);
        }

        async function fetchGroups() {
            const res = await fetch('/api/groups/my-groups', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const groups = await res.json();
            const list = document.getElementById('groupsList');
            document.getElementById('groupCount').innerText = `${groups.length} Groups`;
            list.innerHTML = '';

            groups.forEach(group => {
                const isCreator = group.creator_id === user.id;
                const div = document.createElement('div');
                div.className = 'col-md-6';
                div.innerHTML = `
                    <div class="glass-card p-3 h-100 shadow-sm">
                        <div class="d-flex justify-content-between align-items-start mb-3">
                            <h6 class="fw-bold mb-0 text-dark">${group.name}</h6>
                            <span class="badge-code small" title="Share this code to invite members">${group.group_code}</span>
                        </div>
                        <div class="d-flex gap-2">
                            <button onclick="viewGroup(${group.id})" class="btn btn-primary btn-sm flex-grow-1">
                                <i class="bi bi-map me-1"></i> Open Tracker
                            </button>
                            ${isCreator || user.role === 'admin' ? `
                                <button onclick="deleteGroup(${group.id})" class="btn btn-outline-danger btn-sm px-3" title="Delete Group">
                                    <i class="bi bi-trash"></i>
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        async function deleteGroup(id) {
            if (!confirm('Are you sure you want to delete this group? All tracking data for it will be removed.')) return;
            const res = await fetch(`/api/groups/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) fetchGroups();
            else {
                const data = await res.json();
                alert(data.message);
            }
        }

        async function fetchNotifications() {
            const res = await fetch('/api/notifications', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const notes = await res.json();
            const list = document.getElementById('notificationList');
            list.innerHTML = notes.length ? '' : '<p class="text-muted opacity-50 text-center py-4">No recent activity</p>';
            notes.forEach(n => {
                const div = document.createElement('div');
                div.className = 'mb-3 pb-2 border-bottom border-white border-opacity-10';
                div.innerHTML = `
                    <div class="d-flex align-items-start gap-2">
                        <i class="bi bi-dot ${n.type === 'warning' ? 'text-danger' : 'text-primary'} fs-3 leading-none" style="margin-top: -8px;"></i>
                        <div>
                            <div class="text-white-50 lh-sm">${n.message}</div>
                            <div class="x-small text-muted mt-1" style="font-size: 0.7rem;">${new Date(n.created_at).toLocaleString()}</div>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        // Admin Functions
        async function fetchAdminUsers() {
            const res = await fetch('/api/admin/users', { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            renderAdminTable(data, 'users');
        }

        async function fetchAdminGroups() {
            const res = await fetch('/api/admin/groups', { headers: { 'Authorization': `Bearer ${token}` } });
            const data = await res.json();
            renderAdminTable(data, 'groups');
        }

        function renderAdminTable(data, type) {
            let html = `<table class="table table-dark table-hover table-sm small align-middle">
                <thead><tr><th>ID</th><th>Name</th><th class="text-end">Action</th></tr></thead>
                <tbody>`;
            data.forEach(item => {
                html += `<tr>
                    <td class="text-muted font-monospace">${item.id}</td>
                    <td>${item.username || item.name}</td>
                    <td class="text-end">
                        <button onclick="adminDeleteItem(${item.id}, '${type}')" class="btn btn-link text-danger p-0">
                            <i class="bi bi-x-circle"></i>
                        </button>
                    </td>
                </tr>`;
            });
            html += `</tbody></table>`;
            document.getElementById('adminData').innerHTML = html;
        }

        async function adminDeleteItem(id, type) {
            if (!confirm(`Permanently remove this ${type}?`)) return;
            const res = await fetch(`/api/admin/${type}/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) {
                type === 'users' ? fetchAdminUsers() : fetchAdminGroups();
            }
        }

        document.getElementById('createGroupBtn').addEventListener('click', async () => {
            const name = document.getElementById('groupName').value;
            if (!name) return;
            await fetch('/api/groups/create', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ name })
            });
            document.getElementById('groupName').value = '';
            fetchGroups();
        });

        document.getElementById('joinGroupBtn').addEventListener('click', async () => {
            const groupCode = document.getElementById('groupCode').value;
            if (!groupCode) return;
            const res = await fetch('/api/groups/join', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ groupCode })
            });
            if (res.ok) {
                document.getElementById('groupCode').value = '';
                fetchGroups();
            } else {
                const data = await res.json();
                alert(data.message);
            }
        });

        function viewGroup(id) {
            localStorage.setItem('activeGroupId', id);
            window.location.href = 'map.html';
        }

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            if (window.Clerk && Clerk.user) {
                await Clerk.signOut();
            }
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        });
    </script>
</body>

</html>
