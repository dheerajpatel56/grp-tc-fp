<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location History (OSM) - Group Tracker</title>
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
        #map {
            height: 70vh;
            width: 100%;
            border-radius: 1rem;
            margin-top: 1rem;
            border: 1px solid var(--border);
            z-index: 1;
        }
    </style>
</head>

<body style="display: block; padding-top: 80px;">
    <nav>
        <div class="brand">LOCATOR</div>
        <div style="display: flex; gap: 1rem;">
            <button onclick="window.history.back()"
                style="margin: 0; padding: 0.5rem 1rem; width: auto; background: rgba(255,255,255,0.1);">Back</button>
        </div>
    </nav>

    <main style="padding: 2rem; max-width: 1200px; margin: 0 auto;">
        <h2>Location History (OSM)</h2>
        <div class="card" style="margin-top: 1rem; display: flex; gap: 1rem; align-items: flex-end;">
            <div class="form-group" style="margin: 0;">
                <label>Select Date</label>
                <input type="date" id="historyDate">
            </div>
            <button id="viewHistoryBtn" style="margin: 0; width: auto; padding: 0.75rem 2rem;">Load Route</button>
        </div>
        <div id="map"></div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script>
        const token = localStorage.getItem('token');
        const userId = localStorage.getItem('historyUserId');
        let map;
        let polyline;
        let markers = [];

        if (!token || !userId) {
            window.location.href = 'login.html';
        }

        function initMap() {
            map = L.map('map').setView([0, 0], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap beneficiaries'
            }).addTo(map);

            // Set default date to today
            document.getElementById('historyDate').valueAsDate = new Date();
        }

        document.getElementById('viewHistoryBtn').addEventListener('click', async () => {
            const date = document.getElementById('historyDate').value;
            if (!date) return alert('Please select a date');

            const res = await fetch(`/api/locations/history/${userId}?date=${date}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const history = await res.json();

            if (history.length === 0) {
                alert('No history found for this date');
                return;
            }

            drawRoute(history);
        });

        function drawRoute(history) {
            const path = history.map(point => [
                parseFloat(point.latitude),
                parseFloat(point.longitude)
            ]);

            // Clear previous layers
            if (polyline) map.removeLayer(polyline);
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            // Draw route line
            polyline = L.polyline(path, { color: '#6366f1', weight: 4 }).addTo(map);

            // Fit bounds
            map.fitBounds(polyline.getBounds());

            // Add Start and End markers
            const startMarker = L.marker(path[0]).addTo(map).bindPopup('Start Point').bindTooltip('S', { permanent: true });
            const endMarker = L.marker(path[path.length - 1]).addTo(map).bindPopup('End Point').bindTooltip('E', { permanent: true });

            markers.push(startMarker, endMarker);
        }

        initMap();
    </script>
</body>

</html>
