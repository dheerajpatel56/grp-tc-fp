<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location History - Group Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        #map {
            height: 65vh;
            width: 100%;
            z-index: 1;
        }
    </style>
</head>

<body class="pt-5 antialiased">
    <video autoplay muted loop playsinline class="video-bg">
        <source src="assets/bg-video.mp4" type="video/mp4">
    </video>

    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand fs-4" href="index.html">LOCATOR</a>
            <div class="ms-auto">
                <button onclick="window.history.back()" class="btn btn-outline-light btn-sm rounded-pill px-3">
                    <i class="bi bi-arrow-left me-1"></i> Back
                </button>
            </div>
        </div>
    </nav>

    <main class="container py-5 mt-4">
        <div class="glass-card mb-4 fade-in">
            <div class="row align-items-center g-3">
                <div class="col-md-6">
                    <h4 class="fw-bold mb-1">Route Playback</h4>
                    <p class="text-muted small mb-0">Select a date to visualize the travel history.</p>
                </div>
                <div class="col-md-6">
                    <div class="input-group">
                        <input type="date" id="historyDate" class="form-control">
                        <button id="viewHistoryBtn" class="btn btn-primary px-4">
                            <i class="bi bi-play-fill me-1"></i> Load Route
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-card fade-in" style="animation-delay: 0.1s;">
            <div id="map"></div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const userId = localStorage.getItem('historyUserId');
        let map;
        let polyline;
        let markers = [];

        if (!token || !userId) {
            console.log('Missing session data, staying on page.');
            // window.location.href = 'login.html';
        }


        function initMap() {
            map = L.map('map').setView([0, 0], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap'
            }).addTo(map);

            document.getElementById('historyDate').valueAsDate = new Date();
        }

        document.getElementById('viewHistoryBtn').addEventListener('click', async () => {
            const date = document.getElementById('historyDate').value;
            if (!date) return alert('Please select a date');

            const res = await fetch(`/api/locations/history/${userId}?date=${date}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const history = await res.json();

            if (history.length === 0) {
                alert('No history found for this date');
                return;
            }

            drawRoute(history);
        });

        function drawRoute(history) {
            const path = history.map(point => [
                parseFloat(point.latitude),
                parseFloat(point.longitude)
            ]);

            if (polyline) map.removeLayer(polyline);
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            polyline = L.polyline(path, {
                color: '#6366f1',
                weight: 5,
                opacity: 0.8,
                smoothFactor: 1
            }).addTo(map);

            map.fitBounds(polyline.getBounds(), { padding: [40, 40] });

            const startIcon = L.divIcon({ className: 'badge bg-success rounded-pill px-2 py-1', html: 'START' });
            const endIcon = L.divIcon({ className: 'badge bg-danger rounded-pill px-2 py-1', html: 'END' });

            const startMarker = L.marker(path[0], { icon: startIcon }).addTo(map);
            const endMarker = L.marker(path[path.length - 1], { icon: endIcon }).addTo(map);

            markers.push(startMarker, endMarker);
        }

        initMap();
    </script>
</body>

</html>
