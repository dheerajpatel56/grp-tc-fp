<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Map - Group Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        #map {
            height: 65vh;
            width: 100%;
            z-index: 1;
        }
    </style>
</head>

<body class="pt-5">
    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand fs-4" href="index.html">LOCATOR</a>
            <div class="ms-auto">
                <button onclick="location.href='index.html'" class="btn btn-outline-light btn-sm rounded-pill px-3">
                    <i class="bi bi-chevron-left me-1"></i> Dashboard
                </button>
            </div>
        </div>
    </nav>

    <main class="container py-5 mt-4">
        <div class="row g-4">
            <div class="col-12">
                <div class="glass-card mb-4 fade-in">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <h4 id="groupName" class="fw-bold mb-0">Group Map</h4>
                        <div class="d-flex align-items-center gap-2">
                            <div class="spinner-grow spinner-grow-sm text-primary" role="status"></div>
                            <span class="small text-muted">Live Tracking Active</span>
                        </div>
                    </div>
                    <div id="map"></div>
                </div>
            </div>

            <div class="col-12">
                <div class="glass-card fade-in" style="animation-delay: 0.1s;">
                    <h5 class="fw-bold mb-4">Group Members</h5>
                    <div class="row g-3" id="memberList">
                        <!-- Members will appear here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user'));
        const groupId = localStorage.getItem('activeGroupId');
        let map;
        let markers = {};
        let groupCreatorId = null;

        if (!token || !groupId) {
            window.location.href = 'login.html';
        }

        async function fetchGroupDetails() {
            // Find creator ID from shared local data or another fetch if needed
            // For now, we'll fetch members and check roles if creator is marked
            const res = await fetch('/api/groups/my-groups', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const myGroups = await res.json();
            const currentGroup = myGroups.find(g => g.id == groupId);
            if (currentGroup) {
                document.getElementById('groupName').innerText = currentGroup.name;
                groupCreatorId = currentGroup.creator_id;
            }
        }

        function initMap() {
            map = L.map('map').setView([0, 0], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap'
            }).addTo(map);

            startTracking();
            startPolling();
        }

        async function startTracking() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(async (position) => {
                    const { latitude, longitude } = position.coords;
                    await fetch('/api/locations/update', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ latitude, longitude })
                    });
                }, (err) => console.error(err), { enableHighAccuracy: true });
            }
        }

        async function startPolling() {
            fetchLocations();
            setInterval(fetchLocations, 5000);
        }

        async function fetchLocations() {
            const res = await fetch(`/api/locations/group/${groupId}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const locations = await res.json();
            updateMarkers(locations);
            updateMemberList(locations);
        }

        function updateMarkers(locations) {
            const markerGroup = [];
            locations.forEach(loc => {
                const pos = [parseFloat(loc.latitude), parseFloat(loc.longitude)];
                if (markers[loc.id]) {
                    markers[loc.id].setLatLng(pos);
                } else {
                    markers[loc.id] = L.marker(pos).addTo(map)
                        .bindPopup(`<b>${loc.username}</b>`)
                        .bindTooltip(loc.username, { permanent: true, direction: 'top' });
                }
                markerGroup.push(pos);
            });

            if (locations.length > 0 && Object.keys(markers).length === locations.length) {
                const bounds = L.latLngBounds(markerGroup);
                map.fitBounds(bounds, { padding: [50, 50] });
            }
        }

        function updateMemberList(locations) {
            const list = document.getElementById('memberList');
            list.innerHTML = '';
            locations.forEach(loc => {
                const isMe = loc.id === user.id;
                const canRemove = groupCreatorId === user.id && !isMe;

                const div = document.createElement('div');
                div.className = 'col-md-4';
                div.innerHTML = `
                    <div class="glass-card p-3 h-100 border-opacity-10 d-flex flex-column">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h6 class="fw-bold mb-0">${loc.username} ${isMe ? '<span class="badge badge-indigo ms-1">You</span>' : ''}</h6>
                            <i class="bi bi-circle-fill text-success" style="font-size: 0.6rem;"></i>
                        </div>
                        <p class="small text-muted mb-3 flex-grow-1">
                            <i class="bi bi-clock me-1"></i> Last seen: ${new Date(loc.updated_at).toLocaleTimeString()}
                        </p>
                        <div class="d-flex gap-2">
                            <button onclick="viewHistory(${loc.id})" class="btn btn-outline-light btn-sm flex-grow-1">
                                History
                            </button>
                            ${canRemove ? `
                                <button onclick="removeMember(${loc.id}, '${loc.username}')" class="btn btn-outline-danger btn-sm px-3" title="Remove Member">
                                    <i class="bi bi-person-x"></i>
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        async function removeMember(memberId, username) {
            if (!confirm(`Are you sure you want to remove ${username} from the group?`)) return;
            const res = await fetch(`/api/groups/${groupId}/remove/${memberId}`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) fetchLocations();
            else {
                const data = await res.json();
                alert(data.message);
            }
        }

        function viewHistory(memberUserId) {
            localStorage.setItem('historyUserId', memberUserId);
            window.location.href = 'history.html';
        }

        fetchGroupDetails();
        initMap();
    </script>
</body>

</html>
